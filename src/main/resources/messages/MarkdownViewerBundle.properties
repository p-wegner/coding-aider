            overflow: hidden;\
            transition: max-height 0.5s cubic-bezier(0, 1, 0, 1), padding 0.3s ease-out;\
        }\
        \
        .collapsible-panel.expanded .collapsible-content {\
            max-height: 2000px;\
            padding: 10px 15px;\
            transition: max-height 0.5s ease-in-out, padding 0.3s ease-in;\
