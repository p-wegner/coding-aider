        \
        .collapsible-panel:not(.expanded) .collapsible-arrow {\
            transform: rotate(-90deg);\
        }\
        \
        /* Aider blocks */\
        .aider-panel {\
            margin: 15px 0;\
            border-radius: 6px;\
            overflow: hidden;\
            transition: transform 0.2s ease, box-shadow 0.2s ease;\
        }\
        \
        .aider-panel:hover {\
            transform: translateY(-2px);\
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);\
        }\
        \
        .aider-header {\
            font-weight: bold;\
            padding: 10px 15px;\
        }\
        \
        .aider-intention-header {\
            background: #1a2733;\
            color: #a8c7f0;\
            border-bottom: 1px solid #2c4356;\
        }\
        \
        .aider-summary-header {\
            background: #2d2d2d;\
            color: #e8e8e8;\
            border-bottom: 1px solid #454545;\
        }\
        \
        .aider-commit-message-header {\
            background: #2a3b2a;\
            color: #b8e6b8;\
            border-bottom: 1px solid #3c5c3c;\
        }\
        \
        .aider-output-header {\
            background: #3b3b2a;\
            color: #e6e6b8;\
            border-bottom: 1px solid #5c5c3c;\
        }\
        \
        .aider-system-prompt-header {\
            background: #3b2a3b;\
            color: #e6b8e6;\
            border-bottom: 1px solid #5c3c5c;\
        }\
        \
        .aider-user-prompt-header {\
            background: #2a3b3b;\
            color: #b8e6e6;\
            border-bottom: 1px solid #3c5c5c;\
        }\
        \
        .aider-intention-content, .aider-summary-content, .aider-commit-message-content,\
        .aider-output-content, .aider-system-prompt-content, .aider-user-prompt-content {\
            padding: 12px;\
            font-size: 14px;\
            line-height: 1.5;\
        }\
        \
        .aider-intention-content {\
            background: #1a2733;\
            color: #a8c7f0;\
        }\
        \
        .aider-summary-content {\
            background: #2d2d2d;\
            color: #e8e8e8;\
        }\
        \
        .aider-commit-message-content {\
            background: #2a3b2a;\
            color: #b8e6b8;\
        }\
        \
        .aider-output-content {\
            background: #3b3b2a;\
            color: #e6e6b8;\
        }\
        \
        .aider-system-prompt-content {\
            background: #3b2a3b;\
            color: #e6b8e6;\
        }\
        \
        .aider-user-prompt-content {\
            background: #2a3b3b;\
            color: #b8e6e6;\
        }\
        \
        /* Auto-scroll toggle */\
        .auto-scroll-toggle {\
            position: fixed;\
            bottom: 20px;\
            right: 20px;\
            background: rgba(60, 60, 60, 0.7);\
            color: #fff;\
            border: none;\
            border-radius: 4px;\
            padding: 8px 12px;\
            font-size: 12px;\
            cursor: pointer;\
            z-index: 1000;\
            display: flex;\
            align-items: center;\
            transition: background 0.2s ease;\
        }\
        \
        .auto-scroll-toggle:hover {\
            background: rgba(80, 80, 80, 0.9);\
        }\
        \
        .auto-scroll-toggle.disabled {\
            background: rgba(120, 40, 40, 0.7);\
        }\
        \
        .auto-scroll-toggle.disabled:hover {\
            background: rgba(150, 50, 50, 0.9);\
        }\
        \
        /* Syntax highlighting */\
        .hljs-keyword {\
            color: #cc99cd;\
        }\
        .hljs-string {\
            color: #7ec699;\
        }\
        .hljs-comment {\
            color: #999;\
        }\
        .hljs-number {\
            color: #f08d49;\
        }\
        .hljs-literal {\
            color: #f08d49;\
        }\
        \
        /* Hierarchical structure */\
        .hierarchy-level-1 { margin-left: 0; }\
        .hierarchy-level-2 { margin-left: 20px; }\
        .hierarchy-level-3 { margin-left: 40px; }\
        .hierarchy-level-4 { margin-left: 60px; }\
        .hierarchy-level-5 { margin-left: 80px; }\
        .hierarchy-level-6 { margin-left: 100px; }\
    </style>\
    <script>\
        // Highlight.js for syntax highlighting (minimal inline version)\
        const hljs = (function() {\
            const keywords = 'abstract arguments await boolean break byte case catch char class const continue debugger default delete do double else enum eval export extends false final finally float for function goto if implements import in instanceof int interface let long native new null package private protected public return short static super switch synchronized this throw throws transient true try typeof var void volatile while with yield';\
            const literals = 'true false null undefined NaN Infinity';\
            \
            function highlight(code, language) {\
                if (!language) return code;\
                \
                // Simple syntax highlighting for common languages\
                let highlighted = code\
                    .replace(/\b(class|function|if|else|for|while|return|var|let|const|import|export|from|new|this)\b/g, '<span class="hljs-keyword">$1</span>')\
                    .replace(/(".*?"|\'.*?\'|`.*?`)/g, '<span class="hljs-string">$1</span>')\
                    .replace(/(\/\/.*|\/\\*[\\s\\S]*?\\*\/)/g, '<span class="hljs-comment">$1</span>')\
                    .replace(/\b([0-9]+)\b/g, '<span class="hljs-number">$1</span>')\
                    .replace(/\b(true|false|null|undefined)\b/g, '<span class="hljs-literal">$1</span>');\
                \
                return highlighted;\
            }\
            \
            return { highlight };\
        })();\
    </script>\
</head>\
<body>\
    <div id="content"></div>\
    <button id="autoScrollToggle" class="auto-scroll-toggle">Auto-scroll: ON</button>\
    \
    <script>\
        // Store panel expansion states\
        let panelStates = JSON.parse(localStorage.getItem('markdownViewerPanelStates') || '{}');\
        \
        // Initialize scroll position tracking\
        let isUserScrolled = false;\
        let isAtBottom = false;\
        window.scrollPositionY = 0;\
        window.autoScrollEnabled = true;\
        \
        // Create auto-scroll toggle button\
        const autoScrollToggle = document.getElementById('autoScrollToggle');\
        autoScrollToggle.addEventListener('click', function() {\
            window.autoScrollEnabled = !window.autoScrollEnabled;\
            this.textContent = `Auto-scroll: ${window.autoScrollEnabled ? 'ON' : 'OFF'}`;\
            this.classList.toggle('disabled', !window.autoScrollEnabled);\
            \
            // Notify Kotlin side of the change\
            if (window.jsBridge && window.jsBridge.toggleAutoScroll) {\
                window.jsBridge.toggleAutoScroll(window.autoScrollEnabled);\
            }\
            \
            // If re-enabled and at bottom, scroll to bottom\
            if (window.autoScrollEnabled) {\
                const isCurrentlyAtBottom = (window.innerHeight + window.scrollY) >= document.body.offsetHeight - 50;\
                if (isCurrentlyAtBottom) {\
                    window.scrollTo({\
                        top: document.body.scrollHeight,\
                        behavior: 'smooth'\
                    });\
                }\
            }\
        });\
        \
        // Scroll event listener with throttling\
        let scrollTimeout;\
        window.addEventListener('scroll', function() {\
            // Clear previous timeout\
            if (scrollTimeout) clearTimeout(scrollTimeout);\
            \
            // Set a timeout to run after scrolling ends\
            scrollTimeout = setTimeout(function() {\
                // Check if user is at the bottom of the page\
                isAtBottom = (window.innerHeight + window.scrollY) >= document.body.offsetHeight - 50;\
                \
                // Store current scroll position\
                window.scrollPositionY = window.scrollY;\
                \
                // Mark as user-scrolled only if not at bottom\
                if (!isAtBottom) {\
                    window.userScrolled = true;\
                } else {\
                    // If at bottom, we can reset the user scrolled flag\
                    window.userScrolled = false;\
                }\
                \
                // Notify Kotlin side of scroll position change\
                if (window.jsBridge && window.jsBridge.scrollPositionChanged) {\
                    window.jsBridge.scrollPositionChanged(isAtBottom, window.scrollY);\
                }\
            }, 100);\
        }, { passive: true });\
        \
        // Function to initialize collapsible panels\
        function initCollapsiblePanels() {\
            document.querySelectorAll('.collapsible-header').forEach(header => {\
                // Remove existing event listeners to prevent duplicates\
                header.removeEventListener('click', togglePanel);\
                // Add click event listener\
                header.addEventListener('click', togglePanel);\
                \
                // Restore panel state if available\
                const panel = header.parentElement;\
                const panelId = panel.getAttribute('data-panel-id') || getPanelId(panel);\
                if (panelStates[panelId] !== undefined) {\
                    if (panelStates[panelId]) {\
                        panel.classList.add('expanded');\
                        const arrow = header.querySelector('.collapsible-arrow');\
                        if (arrow) arrow.textContent = '▼';\
                        \
                        // Ensure content is properly sized\
                        const content = panel.querySelector('.collapsible-content');\
                        if (content) {\
                            content.style.maxHeight = content.scrollHeight + 'px';\
                        }\
                    } else {\
                        panel.classList.remove('expanded');\
                        const arrow = header.querySelector('.collapsible-arrow');\
                        if (arrow) arrow.textContent = '▶';\
                    }\
                }\
            });\
            \
            // Apply syntax highlighting to code blocks\
            document.querySelectorAll('pre code').forEach(block => {\
                const language = block.className.replace('language-', '');\
                if (typeof hljs !== 'undefined') {\
                    block.innerHTML = hljs.highlight(block.textContent, language);\
                }\
            });\
        }\
        \
        // Function to initialize search/replace blocks\
        function initSearchReplaceBlocks() {\
            // Add hover effects and animations\
            document.querySelectorAll('.edit-format-panel').forEach(panel => {\
                // Add animation classes\
                panel.classList.add('animated');\
            });\
        }\
        \
        // Function to initialize file path links\
        function initFilePathLinks() {\
            document.querySelectorAll('.file-path').forEach(path => {\
                path.style.cursor = 'pointer';\
                path.title = 'Click to open file';\
                path.addEventListener('click', function() {\
                    const filePath = this.getAttribute('data-path') || this.textContent;\
                    if (window.jsBridge && window.jsBridge.filePathClicked) {\
                        window.jsBridge.filePathClicked(filePath);\
                    }\
                });\
            });\
        }\
        \
        // Generate a unique ID for a panel based on its content\
        function getPanelId(panel) {\
            const header = panel.querySelector('.collapsible-header');\
            const title = header ? header.querySelector('.collapsible-title')?.textContent || '' : '';\
            const contentElement = panel.querySelector('.collapsible-content');\
            const contentText = contentElement ? contentElement.textContent || '' : '';\
            const content = contentText.substring(0, Math.min(50, contentText.length));\
            // Create a safe ID by removing problematic characters\
            const safeTitle = title.replace(/[^\w-]/g, '');\
            const safeContent = content.replace(/\s+/g, '').replace(/[^\w-]/g, '');\
            const panelId = `panel-${safeTitle}-${safeContent}`;\
            \
            // Store the ID as a data attribute for future reference\
            panel.setAttribute('data-panel-id', panelId);\
            \
            return panelId;\
        }\
        \
        // Toggle panel function with animation\
        function togglePanel(event) {\
            const panel = this.parentElement;\
            const isExpanding = !panel.classList.contains('expanded');\
            const content = panel.querySelector('.collapsible-content');\
            \
            // Toggle expanded class\
            panel.classList.toggle('expanded');\
            \
            // Update arrow indicator\
            const arrow = this.querySelector('.collapsible-arrow');\
            if (arrow) {\
                arrow.textContent = isExpanding ? '▼' : '▶';\
            }\
            \
            // Animate content height\
            if (isExpanding) {\
                // Set max-height to scrollHeight for smooth expansion\
                content.style.maxHeight = content.scrollHeight + 'px';\
            } else {\
                // Set max-height to 0 for smooth collapse\
                content.style.maxHeight = '0';\
            }\
            \
            // Save panel state\
            const panelId = panel.getAttribute('data-panel-id') || getPanelId(panel);\
            panelStates[panelId] = isExpanding;\
            localStorage.setItem('markdownViewerPanelStates', JSON.stringify(panelStates));\
            \
            // Notify Kotlin side of panel toggle\
            if (window.jsBridge && window.jsBridge.panelToggled) {\
                window.jsBridge.panelToggled(panelId, isExpanding);\
            }\
        }\
        \
        // Initialize panels when page loads\
        document.addEventListener('DOMContentLoaded', () => {\
            initCollapsiblePanels();\
            initSearchReplaceBlocks();\
            initFilePathLinks();\
        });\
    </script>\
</body>\
</html>
